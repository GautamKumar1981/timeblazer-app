services:
  db:
    image: postgres:15-alpine
    container_name: timeblazer-postgres
    environment:
      POSTGRES_DB: timeblazer_db
      POSTGRES_USER: timeblazer_user
      POSTGRES_PASSWORD: timeblazer_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeblazer_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timeblazer-backend
    environment:
      DATABASE_URL: postgresql://timeblazer_user:timeblazer_password@db:5432/timeblazer_db
      FLASK_ENV: development
      JWT_SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timeblazer-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
      BROWSER: none
      CI: true
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: