version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: timeblazer
      POSTGRES_USER: timeblazer
      POSTGRES_PASSWORD: timeblazer_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeblazer -d timeblazer"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://timeblazer:timeblazer_password@db:5432/timeblazer
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production
      FLASK_ENV: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      REACT_APP_API_URL: http://backend:5000
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

  celery:
    build: ./backend
    command: celery -A app.main.celery worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://timeblazer:timeblazer_password@db:5432/timeblazer
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production
      FLASK_ENV: development
    depends_on:
      - backend
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
